version: 2

models:
  - name: fct_orders
    description: >
      Incremental fact table: one row per order enriched with customer and CFC context.
      Updated on each dbt run by filtering on updated_at, making it efficient for daily
      refreshes over large order volumes. Consumed by commercial and operations dashboards.
      order_key is a surrogate key generated via dbt_utils.generate_surrogate_key.
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    columns:
      - name: order_key
        description: "Surrogate key generated from order_id. Stable identifier for BI joins."
        data_tests: [not_null, unique]
        entity:
          type: primary
          name: order

      - name: order_id
        description: "Natural order identifier from the source system."
        data_tests: [not_null, unique]

      - name: customer_id
        description: "Customer who placed the order."
        data_tests: [not_null]
        entity:
          type: foreign
          name: customer

      - name: cfc_id
        description: "Fulfilment centre that processed the order."
        data_tests: [not_null]
        entity:
          type: foreign
          name: cfc

      - name: order_date
        description: "Date the order was placed."
        data_tests: [not_null]
        granularity: day
        dimension:
          type: time

      - name: delivery_slot
        description: "Requested delivery time window: morning, afternoon, or evening."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['morning', 'afternoon', 'evening']
        dimension:
          type: categorical

      - name: status
        description: "Current fulfilment status."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['placing', 'picking', 'dispatched', 'delivered', 'cancelled']
        dimension:
          type: categorical

      - name: promised_delivery_date
        description: "Delivery date shown to the customer at checkout."
        granularity: day
        dimension:
          type: time

      - name: actual_delivery_date
        description: "Date the order was physically delivered. Null until confirmed."
        granularity: day
        dimension:
          type: time

      - name: is_on_time
        description: "Delivery punctuality: true = on time, false = late, null = not yet delivered."
        dimension:
          type: categorical

      - name: updated_at
        description: "Most recent status change timestamp. Used as incremental watermark."
        data_tests: [not_null]

      - name: total_revenue_pence
        description: "Gross order revenue in pence sterling."

      - name: total_cost_pence
        description: "Total supplier cost for all items in the order, in pence."

      - name: total_margin_pence
        description: "Gross margin in pence: revenue minus cost."

      - name: total_revenue_gbp
        description: "Gross order revenue in pounds sterling."

      - name: total_margin_gbp
        description: "Gross margin in pounds sterling."

      - name: margin_pct
        description: "Gross margin as a proportion of revenue. Null for orders with no items."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1
                row_condition: "margin_pct is not null"

      - name: total_line_items
        description: "Number of distinct product lines in the order."

      - name: loyalty_tier
        description: "Customer loyalty tier at time of data load: bronze, silver, or gold."
        data_tests:
          - accepted_values:
              arguments:
                values: ['bronze', 'silver', 'gold']
        dimension:
          type: categorical

      - name: acquisition_channel
        description: "Marketing channel that drove the customer's registration."
        dimension:
          type: categorical

      - name: postcode_prefix
        description: "Delivery area postcode prefix. Used for regional revenue analysis."
        dimension:
          type: categorical

      - name: cfc_name
        description: "Name of the fulfilment centre that processed this order."
        dimension:
          type: categorical

      - name: region
        description: "Geographic region of the fulfilment centre."
        dimension:
          type: categorical

    metrics:
      - name: order_count
        description: "Total number of orders placed."
        label: Order Count
        type: simple
        agg: count
        expr: 1

      - name: total_revenue_gbp
        description: "Sum of gross order revenue in GBP."
        label: Total Revenue (GBP)
        type: simple
        agg: sum
        expr: total_revenue_gbp

      - name: total_margin_gbp
        description: "Sum of gross margin in GBP."
        label: Total Margin (GBP)
        type: simple
        agg: sum
        expr: total_margin_gbp

      - name: avg_order_value_gbp
        description: "Average revenue per order in GBP."
        label: Average Order Value (GBP)
        type: simple
        agg: average
        expr: total_revenue_gbp

      - name: on_time_deliveries
        description: "Count of orders delivered on or before their promised date."
        label: On-Time Deliveries
        type: simple
        agg: count
        expr: 1
        filter: |
          {{ Dimension('order__is_on_time') }} = True

      - name: delivered_orders
        description: "Count of orders with a confirmed delivery date."
        label: Delivered Orders
        type: simple
        agg: count
        expr: 1
        filter: |
          {{ Dimension('order__is_on_time') }} is not null

      - name: on_time_delivery_rate
        description: "Proportion of delivered orders that arrived on time."
        label: On-Time Delivery Rate
        type: ratio
        numerator: on_time_deliveries
        denominator: delivered_orders

      - name: gross_margin_rate
        description: "Gross margin as a proportion of revenue."
        label: Gross Margin Rate
        type: ratio
        numerator: total_margin_gbp
        denominator: total_revenue_gbp

  - name: fct_cfc_weekly_performance
    description: >
      Weekly operational KPI summary per fulfilment centre. Aggregates daily order
      counts, on-time delivery rates, and average throughput utilisation. Intended for
      operations leadership to track centre health and identify capacity pressure points.
    columns:
      - name: cfc_id
        description: "Fulfilment centre identifier."
        data_tests: [not_null]
      - name: cfc_name
        description: "Human-readable centre name."
        data_tests: [not_null]
      - name: region
        description: "Geographic region of the centre."
        data_tests: [not_null]
      - name: capacity_orders_per_day
        description: "Centre's designed maximum daily throughput."
        data_tests: [not_null]
      - name: robot_fleet_size
        description: "Number of picking robots deployed in the centre."
        data_tests: [not_null]
      - name: week_start
        description: "Monday date marking the start of the reporting week."
        data_tests: [not_null]
      - name: weekly_orders
        description: "Total non-cancelled orders processed by the centre during the week."
        data_tests: [not_null]
      - name: weekly_on_time_deliveries
        description: "Count of orders delivered on or before their promised date."
        data_tests: [not_null]
      - name: weekly_delivered_orders
        description: "Count of orders with a confirmed delivery date during the week."
        data_tests: [not_null]
      - name: weekly_on_time_rate
        description: "Proportion of delivered orders that were on time. Null if no confirmed deliveries."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1
                row_condition: "weekly_on_time_rate is not null"
      - name: avg_daily_throughput_pct
        description: >
          Average of daily (orders_fulfilled / capacity_orders_per_day) across the week.
          Values above 1.0 indicate the centre operated beyond its designed capacity.

  - name: dim_date
    description: Day-grain time spine used by the semantic layer for time-based joins and aggregations.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: Calendar date at day grain.
        granularity: day
